apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-app-blue
  namespace: production
spec:
  replicas: 3
  selector:
    matchLabels:
      app: java-app
      version: blue
  template:
    metadata:
      labels:
        app: java-app
        version: blue
    spec:
      containers:
        - name: java-app
          image: mituldaundkar/java-app:initial
          ports:
            - containerPort: 8080